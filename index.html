        var canvas = document.getElementById("c"), ctx = canvas.getContext("2d"), music = document.getElementById("bgMusic");

        var myPoints = parseInt(localStorage.getItem("ykj_pts")) || 0;

        // --- ऐप इंटीग्रेशन (ईमेल और नाम) ---

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

        // --- डेली बोनस ---
        function claimDailyBonus() {
            let last = localStorage.getItem("lDaily"), today = new Date().toDateString();
            if(last === today) { alert("Already claimed today!"); return; }
            let win = Math.floor(Math.random()*100)+1;
            myPoints += win; localStorage.setItem("lDaily", today); updatePts();
            alert("🎁 Daily Bonus Received: " + win + " Pts!");
        }

        // --- टास्क सिस्टम (वेरिफिकेशन के साथ) ---
        function doTask(type, pts) {
            if(localStorage.getItem("task_"+type)) { alert("Task already done!"); return; }
            window.open(type === 'insta' ? "https://instagram.com/y.k.j.game2" : "https://whatsapp.com");
            setTimeout(() => {
                if(confirm("Did you follow/join? Points will be added after confirmation.")) {
                    myPoints += pts; localStorage.setItem("task_"+type, "done"); updatePts();
                    alert("✅ +" + pts + " Pts Added!");
                }
            }, 3000);
        }

        // --- टूर्नामेंट चेकर ---
        setInterval(() => {
            let hr = new Date().getHours();
            document.getElementById("tournamentBox").style.display = (hr === 18) ? "block" : "none";
        }, 1000);
        // --- स्क्रैच कार्ड (वर्किंग डेवलप कोड) ---
        function initScratch() {
            const sc = document.getElementById("scratchCanvas");
            const sctx = sc.getContext("2d");
            sctx.fillStyle = "#888"; sctx.fillRect(0,0,200,100);
            let scratched = 0;
            sc.onmousemove = sc.ontouchmove = (e) => {
                if(scratched > 6) return;
                sctx.globalCompositeOperation = 'destination-out';
                let rect = sc.getBoundingClientRect();
                let x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                let y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
                sctx.beginPath(); sctx.arc(x, y, 15, 0, Math.PI*2); sctx.fill();
                scratched++;
                if(scratched === 6) {
                    let win = Math.floor(Math.random()*100)+5;
                    myPoints += win; updatePts();
                    document.getElementById("scratchResult").innerText = "🎉 WON: " + win + " Pts!";
                }
            };
        }
                // --- गेम कोर ---
        function startGame(g, s, gp, mode) {
            grav = g; speed = s; gap = gp; active = true; score = 0; birdY = canvas.height/2; birdV = 0; pipes = []; frame = 0; lifeUsed = false;
            document.getElementById("ui").style.display = "none"; document.getElementById("scoreDisplay").style.display = "block";
            alert("WELCOME TO Y.K.J. GAME, " + userName + "!");
            music.play().catch(e => {}); loop();
        }
        function spinNow() {
    // आज की तारीख और स्पिन की गिनती चेक करना
    let today = new Date().toDateString();
    let spinData = JSON.parse(localStorage.getItem("ykj_spin_limit") || "{}");

    // अगर तारीख बदल गई है, तो गिनती 0 कर दो
    if (spinData.date !== today) {
        spinData = { date: today, count: 0 };
    }

    // अगर 2 बार से ज्यादा हो गया है
    if (spinData.count >= 2) {
        alert("आज की स्पिन लिमिट (2/2) खत्म हो गई है! कल फिर आएं।");
        return;
    }

    // पॉइंट्स चेक करना (10 Pts फीस)
    if (myPoints < 10) {
        alert("स्पिन के लिए 10 Pts चाहिए!");
        return;
    }

    // स्पिन शुरू करना
    myPoints -= 10;
    updatePts();
    
    // स्पिन की गिनती बढ़ाना और सेव करना
    spinData.count += 1;
    localStorage.setItem("ykj_spin_limit", JSON.stringify(spinData));

    // व्हील घुमाना
    let wheel = document.getElementById("wheel");
    let deg = Math.floor(Math.random() * 360) + 1800; // 5 चक्कर + रैंडम स्टॉप
    wheel.style.transition = "transform 4s cubic-bezier(0.1, 0.7, 0.1, 1)";
    wheel.style.transform = `rotate(${deg}deg)`;

    // इनाम देना
    setTimeout(() => {
        let prizes = [10, 50, 0, 100, 20, 5];
        let win = prizes[Math.floor(Math.random() * prizes.length)];
        myPoints += win;
        updatePts();
        alert(`🎁 बधाई हो! आपने ${win} Pts जीते। (आज के स्पिन: ${spinData.count}/2)`);
    }, 4500);
}
        function loop() {
            if(!active) return;
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            birdV += grav; birdY += birdV;

            if(frame % 90 == 0) pipes.push({x: canvas.width, t: Math.random()*(canvas.height-(gap+150))+75, p: false});
            if(frame % 400 == 0) mysteryBox = {x: canvas.width, y: Math.random()*canvas.height, active: true};

            if(mysteryBox && mysteryBox.active) {
                mysteryBox.x -= speed; ctx.fillStyle = "violet"; ctx.fillRect(mysteryBox.x, mysteryBox.y, 30, 30);
                if(birdX < mysteryBox.x+30 && birdX+20 > mysteryBox.x && birdY < mysteryBox.y+30 && birdY+20 > mysteryBox.y) {
                    mysteryBox.active = false; myPoints += 20; updatePts(); alert("Surprise! +20 Pts");
                }
            }

            for(var i=pipes.length-1; i>=0; i--) {
                var p = pipes[i]; p.x -= speed; 
                ctx.fillStyle = pipeColor;
                ctx.fillRect(p.x, 0, 65, p.t); ctx.fillRect(p.x, p.t + gap, 65, canvas.height);
                if(!p.p && p.x + 65 < birdX) { score++; p.p = true; document.getElementById("scoreDisplay").innerText = score; }
                if(birdX+15 > p.x && birdX-15 < p.x+65 && (birdY-15 < p.t || birdY+15 > p.t+gap)) endGame();
                if(p.x < -100) pipes.splice(i, 1);
            }
            if(birdY > canvas.height || birdY < 0) endGame();
            drawBird(birdX, birdY); frame++; requestAnimationFrame(loop);
        }

        function drawBird(x, y) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(birdV * 0.04); // गिरने या ऊपर जाने के हिसाब से चिड़िया झुकेगी

    // 1. चिड़िया का शरीर (Main Body)
    ctx.fillStyle = birdColor;
    ctx.beginPath();
    ctx.ellipse(0, 0, 22, 18, 0, 0, Math.PI * 2);
    ctx.fill();

    // 2. चिड़िया के पंख (Animated Wings) - यहाँ नया बदलाव है
    // Math.sin का इस्तेमाल किया है ताकि पंख ऊपर-नीचे फड़फड़ाएं
    var wingFlap = Math.sin(frame * 0.3) * 12; 
    ctx.fillStyle = ""; // थोड़ा गहरा पीला रंग पंखों के लिए
    ctx.beginPath();
    // पंख की पोजीशन और मूवमेंट
    ctx.ellipse(-12, wingFlap, 15, 10, Math.PI / 4, 0, Math.PI * 2);
    ctx.fill();
    // पंख की आउटलाइन (ताकि अलग से दिखे)
    ctx.strokeStyle = "#b8860b";
    ctx.lineWidth = 1;
    ctx.stroke();

    // 3. चिड़िया की आँख (Eye)
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(10, -6, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(12, -6, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // 4. चिड़िया की चोंच (Beak)
    ctx.fillStyle = "#e67e22";
    ctx.beginPath();
    ctx.moveTo(18, 0);
    ctx.lineTo(32, 4);
    ctx.lineTo(18, 10);
    ctx.fill();

    ctx.restore();

    // 5. चिड़िया के ऊपर यूज़र का नाम
    ctx.fillStyle = "gold";
    ctx.font = "bold 14px Arial";
    ctx.textAlign = "center";
    ctx.fillText(userName, x, y - 35);
        }

var isTournament = false, isPaidMode = false, currentMode = "Easy";

function runMyFeatures(s, m) {

    ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,canvas.width, canvas.height);

   // 2 & 9. इनाम

// --- 2. टूर्नामेंट बटन फिक्स (6-7 PM क्लिक प्रॉब्लम) ---
function startTournament() {
    let hr = new Date().getHours();
    // अगर 6 से 7 (18:00 - 19:00) के बीच है तो ही चलेगा
    if(hr !== 18) {
        alert("टूर्नामेंट केवल शाम 6 से 7 बजे के बीच चलता है!");
        return;
    }
    if(myPoints < 500) {
        alert("एंट्री फीस 500 Pts चाहिए!");
        return;
    }
    if(confirm("टूर्नामेंट शुरू करें? फीस: 500 Pts | चैलेंज: 50+ स्कोर")) {
        myPoints -= 500; updatePts();
        isTournament = true;
        currentMode = "Tournament";
        startGame(0.34, 5, 180, 'Hard'); // टूर्नामेंट हमेशा हार्ड मोड में
    }
}

// --- 3. रेफर एंड अर्न (500 Pts) ---

// 1. ऐड मनी (UPI Payment Link)
       function addMoney() {
    let amount = prompt("कितने पैसे ऐड करने हैं? (₹30 - ₹500):", "30");
    
    if (amount >= 30 && amount <= 500) {
        // आपकी सही UPI ID और नाम
        let upiId = "6375843097@fam"; 
        let payeeName = "Yogesh"; // यहाँ अपना असली नाम लिखें जो बैंक में है
        
        // शुद्ध UPI URL (बिना किसी फालतू पैरामीटर के)
        let url = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(payeeName)}&am=${amount}&cu=INR`;
        
        try {
            // पेमेंट ऐप खोलने की कोशिश
            window.location.href = url;
            
            // व्हाट्सएप बैकअप (3 सेकंड बाद)
            setTimeout(() => {
                if(confirm("अगर पेमेंट ऐप नहीं खुला या Error आया, तो सीधे व्हाट्सएप पर मैसेज भेजें?")) {
                    let waMsg = `I want to add ₹${amount} in my game. My ID: ${userEmail || 'Guest'}`;
                    window.open(`https://wa.me/916375843097?text=${encodeURIComponent(waMsg)}`);
                }
            }, 3500);
            
        } catch (err) {
            alert("पेमेंट ऐप खोलने में दिक्कत हुई। कृपया व्हाट्सएप का उपयोग करें।");
        }
    } else {
        alert("कृपया ₹30 से ₹500 के बीच की सही राशि डालें।");
    }
}

// 3. पेड मोड शुरू करना
var isPaidMode = false;
function startPaidMode() {
    if (myPoints < 3000) return alert("कम से कम 3000 Pts चाहिए!");
    
    if (confirm("पेड मोड शुरू करें? \nफीस: 3000 Pts \nशर्त: 100+ स्कोर = 15000 Pts (5X) \n100 से कम = 0 Pts")) {
        myPoints -= 3000;
        updatePts();
        isPaidMode = true;
        currentMode = "UltraPaid";
        // अल्ट्रा मोड के लिए गेम को बहुत मुश्किल बनाना
        startGame(0.45, 7, 140, 'Ultra'); 
    }
}
window.manualBack = function() {
    // 1. बटन छुपाओ
    document.getElementById("gameOverBtnContainer").style.display = "none";
    // 2. मेनू दिखाओ
    hideAll(); 
    document.getElementById("ui").style.display = "flex";
    // 3. गेम डेटा रीसेट
    active = false;
    pipes = [];
    score = 0;
    console.log("Back to Menu Working!");
};
function endGame() {
    active = false;
    saveToHistory(score, currentMode);
    if(music) music.pause();
       // स्कोर को पॉइंट्स में बदलना (उदाहरण: 1 स्कोर = 1 पॉइंट)
    if (score > 0) {
        myPoints += score; 
        alert("बधाई हो! आपने " + score + " पॉइंट्स कमाए।");
    }
    // 1. तुरंत स्क्रीन पर Game Over दिखाना
    try {
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ff4757";
        ctx.font = "bold 60px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
        ctx.fillStyle = "white";
        ctx.font = "22px Arial";
        ctx.fillText("Score: " + score, canvas.width / 2, canvas.height / 2 + 50);
    } catch(e) { console.log("Canvas Error"); }
    // 2. फीचर्स को सुरक्षित तरीके से चलाना (अगर कोई एरर आया तो ये हिस्सा स्किप हो जाएगा)
    try {
        if (typeof saveToHistory === "function") saveToHistory(score, currentMode);
        
        if (isPaidMode && score >= 100) { myPoints += 15000; alert("🔥 5X WIN!"); }
        if (isTournament && score >= 50) { myPoints += 2000; alert("🏆 TOURNAMENT WIN!"); }
        
        isTournament = false;
        isPaidMode = false;
        if (typeof updatePts === "function") updatePts();
    } catch(e) { console.log("Features Error, but returning to menu..."); }

    // 3. यह हिस्सा 100% वापस ले जाएगा (सबसे जरूरी)
    setTimeout(function() {
        // UI एलिमेंट्स को दिखाना/छुपाना
        let menuUI = document.getElementById("ui");
        let scoreUI = document.getElementById("scoreDisplay");
        
        if (menuUI) menuUI.style.display = "flex";
        if (scoreUI) scoreUI.style.display = "none";
        
        // गेम डेटा साफ़ करना
        pipes = [];
        score = 0;
        
        console.log("Forced Return to Menu");
    }, 1000); // 1000 मतलब 1 सेकंड
}
// कोई कंसोल खोलेगा तो उसे वार्निंग मिलेगी या गेम अटक जाएगा
setInterval(function() {
    if (window.outerHeight - window.innerHeight > 160 || window.outerWidth - window.innerWidth > 160) {
        myPoints = 0; // हैक करने की कोशिश पर पॉइंट्स 0 कर दो
        alert("Hacking Detected! Points Reset.");
        location.reload();
    }
}, 1000);
function updatePts() {
    // स्क्रीन पर जहाँ-जहाँ पॉइंट्स दिखते हैं, सब जगह अपडेट करें
    if(document.getElementById('userPts')) document.getElementById('userPts').innerText = myPoints;
    if(document.getElementById('totalPts')) document.getElementById('totalPts').innerText = myPoints;
        // अगर पॉइंट्स अचानक से बहुत ज्यादा बढ़ जाएं (जैसे 10,000 से ऊपर), तो उसे रिजेक्ट कर दो
    if (myPoints > 50000) {
        myPoints = 0;
        alert("Invalid Points Detected!");
    }
    
    if (typeof AppCreator24 !== 'undefined') {
        AppCreator24.setVariable('points', myPoints);
    }
    // ₹ पैसे का हिसाब (100 Pts = ₹1)
    let cash = (myPoints / 100).toFixed(2);
    if(document.getElementById('ptsToCash')) document.getElementById('ptsToCash').innerText = cash;
    if(document.getElementById('cashVal')) document.getElementById('cashVal').innerText = cash;

    // AppCreator24 / Gmail सिंक
    if (typeof AppCreator24 !== 'undefined') {
        AppCreator24.setVariable('pts', myPoints.toString());
    }
    
    // लोकल बैकअप
    localStorage.setItem('ykj_pts', myPoints);
}

// 2. 10 सीक्रेट कोड वाला फंक्शन
function applyCode() {
    let input = document.getElementById("promoCode").value.toUpperCase().trim();
    let used = JSON.parse(localStorage.getItem("used_codes") || "[]");
    let codes = ["YKJ3000", "BINA100", "RAJA33", "ANSHU77", "GAMER99", "YKJAAT", "JAATJAAT1", "KALERA12", "JATBOY12", "PAPABOLPAPA", "JACKPOT1", "LUCKY10", "PROPLAY", "HACK3K", "FREE3000"];

    if (used.includes(input)) return alert("कोड पहले इस्तेमाल हो चुका है!");
    
    if (codes.includes(input)) {
        myPoints += 3000;
        used.push(input);
        localStorage.setItem("used_codes", JSON.stringify(used));
        updatePts(); // तुरंत स्क्रीन अपडेट होगी
        alert("सफलता! 3000 Pts मिल गए।");
        document.getElementById("promoCode").value = "";
    } else {
        alert("गलत कोड!");
    }
}

// 3. गेम लोड होते ही पुराने पॉइंट्स वापस लाना
window.addEventListener('load', function() {
    let localSaved = localStorage.getItem('ykj_pts');
    if (localSaved !== null) myPoints = parseInt(localSaved);
    
    // AppCreator24 से सिंक
    if (typeof AppCreator24 !== 'undefined') {
        let cloudPts = AppCreator24.getVariable('pts');
        if (cloudPts) myPoints = parseInt(cloudPts);
    }
    updatePts();
});
function savePoints(user, points){
  db.collection("users").doc(user.uid).set({
    email: user.email,
    points: points
  });
}
function showHistory() {
    let history = JSON.parse(localStorage.getItem('game_history')) || [];

    if (history.length === 0) {
        alert("WELCOME TO HISTORY!");
        return;
    }    let text = "Last 10 Games:\n\n";
    history.forEach((h, i) => {
        text += `${i+1}. Score: ${h.score} | ${h.date}\n`;
    });

    alert(text);
}
function updatePts() {
    document.getElementById('userPts').innerText = myPoints;
    document.getElementById('totalPts').innerText = myPoints;

    let cash = (myPoints / 100).toFixed(2);
    document.getElementById('ptsToCash').innerText = cash;
    document.getElementById('cashVal').innerText = cash;

    // 🔥 CLOUD SAVE (IMPORTANT)
    if (typeof AppCreator24 !== 'undefined') {
        AppCreator24.setVariable('points', myPoints.toString());
    }

    // Local backup
    localStorage.setItem('ykj_pts', myPoints);
}
window.addEventListener('load', function() {
  loadItems();
    let localSaved = localStorage.getItem('ykj_pts');
    if (localSaved !== null) myPoints = parseInt(localSaved);

    // 🔥 Cloud से load
    if (typeof AppCreator24 !== 'undefined') {
        let cloudPts = AppCreator24.getVariable('points');
        if (cloudPts) myPoints = parseInt(cloudPts);
    }

    updatePts();
});
function saveToHistory(score, mode) {
    let history = JSON.parse(localStorage.getItem('game_history')) || [];

    history.unshift({
        score: score,
        mode: mode,
        date: new Date().toLocaleString()
    });

    if (history.length > 100) history.pop();

    localStorage.setItem('game_history', JSON.stringify(history));
}
// ===== ITEM SYSTEM START =====
let birdSkins = {
    bird1: "#f1c40f",
    bird2: "#3498db",
    bird3: "#e74c3c",
    bird4: "#00ffcc",
    bird5: "#9b59b6"
};
let pipeSkins = {
    pipe1: "#2ecc71",
    pipe2: "#e74c3c",
    pipe3: "#f1c40f",
    pipe4: "#00ffff",
    pipe5: "#ff8800"
};
// BUY ITEM
function buyItem(type, price){if (localStorage.getItem("owned_" + type)) {
    applyItem(type);
    alert("Already owned, applied!");
    return;
}
    if (myPoints < price) {
        alert("Not enough points!");
        return;
    }
    myPoints -= price;
    // Save purchase
    localStorage.setItem("owned_" + type, "true");
    // Apply instantly
    applyItem(type);
    updatePts();
    alert("✅ Item Purchased & Applied!");}
// APPLY ITEM
function applyItem(type) {
    if (birdSkins[type]) {
        birdColor = birdSkins[type];
        localStorage.setItem("selected_bird", type);
    }
    if (pipeSkins[type]) {
        pipeColor = pipeSkins[type];
        localStorage.setItem("selected_pipe", type);
    }
}
// LOAD SAVED ITEMS (auto apply)
function loadItems() {
    let savedBird = localStorage.getItem("selected_bird");
    let savedPipe = localStorage.getItem("selected_pipe");
    if (savedBird && birdSkins[savedBird]) {
        birdColor = birdSkins[savedBird];
    }
    if (savedPipe && pipeSkins[savedPipe]) {
        pipeColor = pipeSkins[savedPipe];
    }
}
