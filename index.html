    <div id="leaderUI" style="display:none;"><div class="box"><h2 style="color: gold;">LEADERBOARD</h2><div id="leaderList" style="text-align: left;"></div><button class="btn" style="background: white;" onclick="hideAll()">BACK</button></div></div>

    <script>
        var canvas = document.getElementById("c"), ctx = canvas.getContext("2d"), music = document.getElementById("bgMusic");
        var active = false, score = 0, birdY, birdX = 80, birdV = 0, pipes = [], frame = 0, lifeUsed = false;
        var myPoints = parseInt(localStorage.getItem("ykj_pts")) || 0;
        var userEmail = "Guest", userName = "YOGESH", birdColor = "#f1c40f", pipeColor = "#2ecc71";
        var mysteryBox = null, display_name = "";

        // --- ऐप इंटीग्रेशन (ईमेल और नाम) ---
        if (typeof AppCreator24 !== 'undefined') { 
            userEmail = AppCreator24.getUserEmail() || "Guest"; 
            userName = userEmail.split('@')[0].toUpperCase();
            document.getElementById("userEmailTag").innerText = "Login: " + userEmail;
        }
        document.getElementById("neonName").innerText = "WELCOME " + userName;
        display_name = userName;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        // --- डेली बोनस ---
        function claimDailyBonus() {
            let last = localStorage.getItem("lDaily"), today = new Date().toDateString();
            if(last === today) { alert("Already claimed today!"); return; }
            let win = Math.floor(Math.random()*100)+1;
            myPoints += win; localStorage.setItem("lDaily", today); updatePts();
            alert("🎁 Daily Bonus Received: " + win + " Pts!");
        }

        // --- टास्क सिस्टम (वेरिफिकेशन के साथ) ---
        function doTask(type, pts) {
            if(localStorage.getItem("task_"+type)) { alert("Task already done!"); return; }
            window.open(type === 'insta' ? "https://instagram.com/y.k.j.game" : "https://whatsapp.com");
            setTimeout(() => {
                if(confirm("Did you follow/join? Points will be added after confirmation.")) {
                    myPoints += pts; localStorage.setItem("task_"+type, "done"); updatePts();
                    alert("✅ +" + pts + " Pts Added!");
                }
            }, 3000);
        }

        // --- टूर्नामेंट चेकर ---
        setInterval(() => {
            let hr = new Date().getHours();
            document.getElementById("tournamentBox").style.display = (hr === 18) ? "block" : "none";
        }, 1000);
        // 7. स्पिन वर्किंग
function spinNow() {
    if(myPoints < 10) return alert("10 Pts needed!");
    myPoints -= 10; updatePts();
    let d = Math.floor(Math.random() * 360) + 1800;
    document.getElementById("wheel").style.transform = `rotate(${d}deg)`;
    setTimeout(() => { let w = [10, 50, 0, 100][Math.floor(Math.random()*4)]; myPoints += w; updatePts(); alert("Won: "+w); }, 4000);
}


        // --- स्क्रैच कार्ड (वर्किंग डेवलप कोड) ---
        function initScratch() {
            const sc = document.getElementById("scratchCanvas");
            const sctx = sc.getContext("2d");
            sctx.fillStyle = "#888"; sctx.fillRect(0,0,200,100);
            let scratched = 0;
            sc.onmousemove = sc.ontouchmove = (e) => {
                if(scratched > 6) return;
                sctx.globalCompositeOperation = 'destination-out';
                let rect = sc.getBoundingClientRect();
                let x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                let y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
                sctx.beginPath(); sctx.arc(x, y, 15, 0, Math.PI*2); sctx.fill();
                scratched++;
                if(scratched === 6) {
                    let win = Math.floor(Math.random()*100)+5;
                    myPoints += win; updatePts();
                    document.getElementById("scratchResult").innerText = "🎉 WON: " + win + " Pts!";
                }
            };
        }

    
        // --- गेम कोर ---
        function startGame(g, s, gp, mode) {
            grav = g; speed = s; gap = gp; active = true; score = 0; birdY = canvas.height/2; birdV = 0; pipes = []; frame = 0; lifeUsed = false;
            document.getElementById("ui").style.display = "none"; document.getElementById("scoreDisplay").style.display = "block";
            alert("WELCOME TO Y.K.J. GAME, " + userName + "!");
            music.play().catch(e => {}); loop();
        }

        function endGame() {
        if(!lifeUsed && score > 2) {
                if(confirm("Use 50 Pts for Extra Life?")) {
                    myPoints -= 50; updatePts(); lifeUsed = true; birdY = canvas.height/2; birdV = 0; return;
                }
            }
            active = false; music.pause();
            let earned = (score >= 150) ? 50 : (score >= 90) ? 30 : (score >= 30) ? 15 : (score >= 10) ? 5 : 0;
            if(score >= 100) { try { new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3').play(); } catch(e){} }
            myPoints += earned; updatePts();
            document.getElementById("ui").style.display = "flex"; document.getElementById("scoreDisplay").style.display = "none";
        }
        function spinNow() {
    // आज की तारीख और स्पिन की गिनती चेक करना
    let today = new Date().toDateString();
    let spinData = JSON.parse(localStorage.getItem("ykj_spin_limit") || "{}");

    // अगर तारीख बदल गई है, तो गिनती 0 कर दो
    if (spinData.date !== today) {
        spinData = { date: today, count: 0 };
    }

    // अगर 2 बार से ज्यादा हो गया है
    if (spinData.count >= 2) {
        alert("आज की स्पिन लिमिट (2/2) खत्म हो गई है! कल फिर आएं।");
        return;
    }

    // पॉइंट्स चेक करना (10 Pts फीस)
    if (myPoints < 10) {
        alert("स्पिन के लिए 10 Pts चाहिए!");
        return;
    }

    // स्पिन शुरू करना
    myPoints -= 10;
    updatePts();
    
    // स्पिन की गिनती बढ़ाना और सेव करना
    spinData.count += 1;
    localStorage.setItem("ykj_spin_limit", JSON.stringify(spinData));

    // व्हील घुमाना
    let wheel = document.getElementById("wheel");
    let deg = Math.floor(Math.random() * 360) + 1800; // 5 चक्कर + रैंडम स्टॉप
    wheel.style.transition = "transform 4s cubic-bezier(0.1, 0.7, 0.1, 1)";
    wheel.style.transform = `rotate(${deg}deg)`;

    // इनाम देना
    setTimeout(() => {
        let prizes = [10, 50, 0, 100, 20, 5];
        let win = prizes[Math.floor(Math.random() * prizes.length)];
        myPoints += win;
        updatePts();
        alert(`🎁 बधाई हो! आपने ${win} Pts जीते। (आज के स्पिन: ${spinData.count}/2)`);
    }, 4500);
}

        function loop() {
            if(!active) return;
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            birdV += grav; birdY += birdV;

            if(frame % 90 == 0) pipes.push({x: canvas.width, t: Math.random()*(canvas.height-(gap+150))+75, p: false});
            if(frame % 400 == 0) mysteryBox = {x: canvas.width, y: Math.random()*canvas.height, active: true};

            if(mysteryBox && mysteryBox.active) {
                mysteryBox.x -= speed; ctx.fillStyle = "violet"; ctx.fillRect(mysteryBox.x, mysteryBox.y, 30, 30);
                if(birdX < mysteryBox.x+30 && birdX+20 > mysteryBox.x && birdY < mysteryBox.y+30 && birdY+20 > mysteryBox.y) {
                    mysteryBox.active = false; myPoints += 20; updatePts(); alert("Surprise! +20 Pts");
                }
            }

            for(var i=pipes.length-1; i>=0; i--) {
                var p = pipes[i]; p.x -= speed; ctx.fillStyle = pipeColor;
                ctx.fillRect(p.x, 0, 65, p.t); ctx.fillRect(p.x, p.t + gap, 65, canvas.height);
                if(!p.p && p.x + 65 < birdX) { score++; p.p = true; document.getElementById("scoreDisplay").innerText = score; }
                if(birdX+15 > p.x && birdX-15 < p.x+65 && (birdY-15 < p.t || birdY+15 > p.t+gap)) endGame();
                if(p.x < -100) pipes.splice(i, 1);
            }
            if(birdY > canvas.height || birdY < 0) endGame();
            drawBird(birdX, birdY); frame++; requestAnimationFrame(loop);
        }

        function drawBird(x, y) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(birdV * 0.04); // गिरने या ऊपर जाने के हिसाब से चिड़िया झुकेगी

    // 1. चिड़िया का शरीर (Main Body)
    ctx.fillStyle = "#f1c40f"; 
    ctx.beginPath();
    ctx.ellipse(0, 0, 22, 18, 0, 0, Math.PI * 2);
    ctx.fill();

    // 2. चिड़िया के पंख (Animated Wings) - यहाँ नया बदलाव है
    // Math.sin का इस्तेमाल किया है ताकि पंख ऊपर-नीचे फड़फड़ाएं
    var wingFlap = Math.sin(frame * 0.3) * 12; 
    ctx.fillStyle = "#ffd700"; // थोड़ा गहरा पीला रंग पंखों के लिए
    ctx.beginPath();
    // पंख की पोजीशन और मूवमेंट
    ctx.ellipse(-12, wingFlap, 15, 10, Math.PI / 4, 0, Math.PI * 2);
    ctx.fill();
    // पंख की आउटलाइन (ताकि अलग से दिखे)
    ctx.strokeStyle = "#b8860b";
    ctx.lineWidth = 1;
    ctx.stroke();

    // 3. चिड़िया की आँख (Eye)
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(10, -6, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(12, -6, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // 4. चिड़िया की चोंच (Beak)
    ctx.fillStyle = "#e67e22";
    ctx.beginPath();
    ctx.moveTo(18, 0);
    ctx.lineTo(32, 4);
    ctx.lineTo(18, 10);
    ctx.fill();

    ctx.restore();

    // 5. चिड़िया के ऊपर यूज़र का नाम
    ctx.fillStyle = "gold";
    ctx.font = "bold 14px Arial";
    ctx.textAlign = "center";
    ctx.fillText(userName, x, y - 35);
}


        function updatePts()
{
            localStorage.setItem("ykj_pts", myPoints);
            document.getElementById("userPts").innerText = myPoints;
            document.getElementById("totalPts").innerText = myPoints;
            let cash = (myPoints / 100).toFixed(2);
            document.getElementById("ptsToCash").innerText = cash;
            document.getElementById("cashVal").innerText = cash;
            if (typeof AppCreator24 !== 'undefined') AppCreator24.setVariable('points', myPoints);
        }

        function showScratch() { hideAll(); document.getElementById("scratchUI").style.display="flex"; initScratch(); }
        function showShop() { hideAll(); document.getElementById("shopUI").style.display="flex"; }
        function buyItem(type, price) {
            if(myPoints < price) { alert("Not enough points!"); return; }
            myPoints -= price; updatePts();
            if(type === 'blue') birdColor = "cyan"; else pipeColor = "red";
            alert("Item Purchased and Applied!");
        }
        function showSquad() { hideAll(); document.getElementById("squadUI").style.display="flex"; }
        function sendMsg() { 
            let m = document.getElementById("chatInput").value; 
            if(m) { document.getElementById("chatBox").innerHTML += `<br><b>${userName}:</b> ${m}`; document.getElementById("chatInput").value=""; }
        }
        function sendWithdrawRequest() {
            let upi = document.getElementById("upiInput").value;
            if(myPoints < 10000) { alert("Min ₹100 (10000 Pts) required!"); return; }
            if(!upi) { alert("Enter UPI ID"); return; }
            window.open(`https://wa.me/916375843097?text=WITHDRAW_REQUEST%0AEmail:${userEmail}%0APts:${myPoints}%0AUPI:${upi}`);
        }
        function hideAll() { 
            const ids = ["ui","historyUI","walletUI","spinUI","leaderUI","scratchUI","taskUI","shopUI","squadUI"];
            ids.forEach(id => document.getElementById(id).style.display="none");
            document.getElementById("ui").style.display="flex";
        }
        function showWallet() { hideAll(); document.getElementById("walletUI").style.display="flex"; }
        function showHistory() {
            hideAll(); // पहले बाकी सब छुपाओ
             const historyUI = document.getElementById("historyUI");
              historyUI.style.display = "flex";

              // ब्राउज़र की मेमोरी (localStorage) से पुरानी हिस्ट्री निकालो
               let data = JSON.parse(localStorage.getItem("myGameHistory") || "[]");

              // अगर हिस्ट्री खाली है तो मैसेज दिखाओ, वरना लिस्ट बनाओ
              if (data.length === 0) {
                historyUI.innerHTML = "<h3>No History Yet!</h3><button onclick='hideAll()'>Back</button>";
                   } else {
                   let listHTML = "<h3>Last 10 Games</h3><ul style='color:white; list-style:none; padding:0;'>";
                 data.slice(0, 10).forEach((game, i) => {
            listHTML += `<li>${i+1}. Score: ${game.score} (${game.time})</li>`;
               });
              listHTML += "</ul><button onclick='hideAll()'>Back</button>";
             historyUI.innerHTML = listHTML;
               }
        }
        function showTask() { hideAll(); document.getElementById("taskUI").style.display="flex"; }
        function showSpin() { hideAll(); document.getElementById("spinUI").style.display="flex"; }

// --- 1. हिस्ट्री को फिक्स करना (20 गेम्स मोड के साथ) ---
function showHistory() {
    hideAll();
    let historyUI = document.getElementById("historyUI");
    historyUI.style.display = "flex";
    
    let data = JSON.parse(localStorage.getItem("ykj_history") || "[]");
    let html = "<div class='box'><h3>📜 HISTORY (Last 20)</h3><div style='max-height:250px; overflow-y:auto; text-align:left;'>";
    
    if(data.length === 0) {
        html += "<p>No games played yet!</p>";
    } else {
        data.forEach((g, i) => {
            html += `<p style='font-size:12px; border-bottom:1px solid #444; padding:5px;'>${i+1}. <b>Score: ${g.score}</b> [${g.mode}]<br><small>${g.time}</small></p>`;
        });
    }
    html += "</div><button class='btn' style='background:white; color:black;' onclick='hideAll()'>BACK</button></div>";
    historyUI.innerHTML = html;
}

function endGame() {
    active = false;
    if(music) music.pause();

    // --- गेम ओवर स्क्रीन (बड़े अक्षरों में) ---
    ctx.fillStyle = "rgba(0,0,0,0.7)"; // हल्का काला बैकग्राउंड
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = "#ff4757"; // लाल रंग
    ctx.font = "bold 60px Arial";
    ctx.textAlign = "center";
    ctx.shadowBlur = 20;
    ctx.shadowColor = "red";
    ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
    
    ctx.shadowBlur = 0; // शैडो हटाना
    ctx.fillStyle = "white";
    ctx.font = "25px Arial";
    ctx.fillText("Final Score: " + score, canvas.width / 2, canvas.height / 2 + 60);
    // ---------------------------------------

    // रिवॉर्ड चेक (टूर्नामेंट और पेड मोड के लिए)
    if (isTournament && score >= 50) {
        let p = (score >= 100) ? 2000 : (score >= 70) ? 1000 : 500;
        myPoints += p;
        alert("🏆 टूर्नामेंट प्राइज: " + p + " Pts!");
    }

    if (isPaidMode && score >= 100) {
        myPoints += 15000;
        alert("🔥 5X JACKPOT WIN!");
    }

    // हिस्ट्री सेव करना
    saveToHistory(score, currentMode);
    
    isTournament = false;
    isPaidMode = false;
    updatePts();

    // 2 सेकंड बाद वापस मेनू पर ले जाना
    setTimeout(() => {
        document.getElementById("ui").style.display = "flex";
        document.getElementById("scoreDisplay").style.display = "none";
    }, 2500);
}
